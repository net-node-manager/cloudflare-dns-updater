name: Hourly DNS Update
on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'
jobs:
  run-updater:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - run: |
          pip install requests
          python main.py
