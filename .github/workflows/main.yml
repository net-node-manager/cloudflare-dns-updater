name: Hourly DNS Update
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
jobs:
  run-updater:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install requests
      - name: Run script
        run: python main.py
